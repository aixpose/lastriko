name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: ${{ matrix.node-version }} (${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - node-version: '22'
            toolchain: npm
          - node-version: '24'
            toolchain: npm
          - node-version: '26'
            toolchain: npm
          - node-version: '22'
            toolchain: bun

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Setup Bun
        if: matrix.toolchain == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: ${{ matrix.toolchain }} run typecheck

      - name: Lint
        run: ${{ matrix.toolchain }} run lint

      - name: Unit tests
        run: ${{ matrix.toolchain }} run test

      - name: Integration tests
        run: ${{ matrix.toolchain }} run test:integration

      - name: Client bundle size
        run: ${{ matrix.toolchain }} run check:bundle
