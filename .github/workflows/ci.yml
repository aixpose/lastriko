name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: ${{ matrix.node-version }} (${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - node-version: '22'
            toolchain: npm
          - node-version: '24'
            toolchain: npm
          - node-version: '22'
            toolchain: bun

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Setup Bun
        if: matrix.toolchain == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: ${{ matrix.toolchain }} run typecheck

      - name: Lint
        run: ${{ matrix.toolchain }} run lint

      - name: Unit tests + coverage (thresholds)
        run: ${{ matrix.toolchain }} run test:coverage

      - name: Integration tests
        run: ${{ matrix.toolchain }} run test:integration

      - name: Client bundle size
        run: ${{ matrix.toolchain }} run check:bundle

  browser-quality:
    name: browser-quality (playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Playwright E2E
        run: npm run test:e2e

      - name: Accessibility gate
        run: npm run test:a11y

      - name: Performance benchmark suite
        run: npm run benchmark:phase45

      - name: Generate benchmark markdown summary
        run: npm run perf:report

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            test-results/
            playwright-report/
            artifacts/
